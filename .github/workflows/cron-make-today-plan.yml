# Matches configs/config.crons.jsonc entry "make-today-plan" (runLocation: github_actions).
# Default: 23:00 UTC daily ≈ 07:00 next calendar day Asia/Makassar (Bali/WITA). Adjust if you change timezone.
name: Cron make-today-plan

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  make-today-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node (for config gate)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps for JSONC parse
        run: npm ci
        working-directory: apps/cron-supervisor

      - name: Check configs/config.crons.jsonc allows this run
        id: gate
        run: node apps/cron-supervisor/scripts/gh-cron-enabled.mjs make-today-plan

      - name: Skip notice (cron disabled in config)
        if: steps.gate.outputs.enabled != 'true'
        run: 'echo "Skipping Claude step — reason=${{ steps.gate.outputs.reason }}"'

      - name: Run manager today plan
        if: steps.gate.outputs.enabled == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Treat `agents/manager` as the primary project: respect its CLAUDE.md, skills, and slash commands.
            Execute: /make-today-plan
          claude_args: |
            --add-dir agents/manager
